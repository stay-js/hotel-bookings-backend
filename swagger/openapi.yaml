      summary: Új hotel létrehozása
      operationId: hotels.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelRequest"
            example: {"name":"Hotel Example","address":"1011 Budapest, Fő utca 1.","rating":4.2}
      responses:
        "201":
          description: Hotel létrehozva
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/HotelResource"
              example: {"data":{"id":999,"name":"Hotel Example","address":"1011 Budapest, Fő utca 1.","rating":4.2,"bookings":[]}}
