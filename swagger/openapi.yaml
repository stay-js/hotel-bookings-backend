    post:
      tags: [Bookings]
      summary: Új foglalás létrehozása
      operationId: bookings.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequest"
            example: {"hotel_id":1,"name":"Teszt Elek","check_in":"2025-02-01","check_out":"2025-02-05","number_of_guests":2,"type":"double"}
      responses:
        "201":
          description: Foglalás létrehozva
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BookingResource"
              example: {"data":{"id":41,"name":"Teszt Elek","check_in":"2025-02-01","check_out":"2025-02-05","number_of_guests":2,"type":"double","hotel":{"id":1,"name":"Szilágyi Bt.","address":"5869 Sopron, Henrietta turistaút 8.","rating":1.92}}}
        "422":
          description: Validációs hiba

  /api/bookings/{booking}:
    get:
      tags: [Bookings]
      summary: Egy adott foglalás lekérése
      operationId: bookings.show
      parameters:
        - name: booking
          in: path
          required: true
          schema:
            type: integer
          example: 10
      responses:
        "200":
          description: Egy adott foglalás
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BookingResource"
              example: {"data":{"id":10,"name":"Fülöp Antal","check_in":"2024-07-23","check_out":"2026-01-07","number_of_guests":1,"type":"single","hotel":{"id":2,"name":"Hegedüs Updated","address":"9952 Budapest, Nagy játszótér 52.","rating":3.5}}}
        "404":
          description: Nem található a keresett elem
    put:
      tags: [Bookings]
      summary: Egy adott foglalás frissítése
      operationId: bookings.update
      parameters:
        - name: booking
          in: path
          required: true
          schema:
            type: integer
          example: 11
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequest"
            example: {"hotel_id":1,"name":"Nemes István Updated","check_in":"2025-01-23","check_out":"2025-11-19","number_of_guests":2,"type":"double"}
      responses:
        "200":
          description: Foglalás frissítve
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BookingResource"
              example: {"data":{"id":11,"name":"Nemes István Updated","check_in":"2025-01-23","check_out":"2025-11-19","number_of_guests":2,"type":"double","hotel":{"id":1,"name":"Szilágyi Bt.","address":"5869 Sopron, Henrietta turistaút 8.","rating":1.92}}}
        "404":
          description: Nem található a keresett elem
        "422":
          description: Validációs hiba
    delete:
      tags: [Bookings]
      summary: Egy adott foglalás törlése
      operationId: bookings.destroy
      parameters:
        - name: booking
          in: path
          required: true
          schema:
            type: integer
          example: 12
      responses:
        "204":
          description: Elem törölve
        "404":
          description: Nem található a keresett elem
        "500":
          description: Szerver hiba

components:
  schemas:
    HotelRequest:
      type: object
      additionalProperties: false
      required: [name, address]
      properties:
        name:
          type: string
          maxLength: 45
        address:
          type: string
          maxLength: 80
        rating:
          type: number
          nullable: true

    BookingRequest:
      type: object
      additionalProperties: false
      required: [hotel_id, name, check_in, check_out, number_of_guests, type]
      properties:
        hotel_id:
          type: integer
        name:
          type: string
          maxLength: 45
        check_in:
          type: string
          format: date
        check_out:
          type: string
          format: date
        number_of_guests:
          type: integer
          minimum: 1
          maximum: 6
        type:
          type: string
          maxLength: 20
          enum: ["single","double","twin","family"]

    HotelResource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        rating:
          type: number
          nullable: true
        bookings:
          type: array
          description: "A hotelhez tartozó foglalások (csak ha a relation be van töltve)."
          items:
            $ref: "#/components/schemas/BookingResource"

    BookingResource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        check_in:
          type: string
          format: date
        check_out:
          type: string
          format: date
        number_of_guests:
          type: integer
        type:
          type: string
        hotel:
          nullable: true
          description: "A foglaláshoz tartozó hotel (csak ha a relation be van töltve)."
          allOf:
            - $ref: "#/components/schemas/HotelResource"
